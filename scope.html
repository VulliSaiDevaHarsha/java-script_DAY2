<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Global Scope
        let x=29
        let y=27
        function f1(){
            console.log(x)
            document.write(x)
            document.write("<br>")
        }
        function f2(){
            console.log(y)
            document.write(y)
        }
        f1()
        f2()
        document.write("<br>")

        //Local Scope

        function f1(){
            let x=29
            console.log(x)
            document.write(x)
            document.write("<br>")
        }
        f1()
    </script>
</body>
</html>
